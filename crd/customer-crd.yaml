apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: customers.mcsp.io
spec:
  group: mcsp.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                customerName:
                  type: string
                tier:
                  type: string
                replicas:
                  type: integer
  scope: Cluster
  names:
    plural: customers
    singular: customer
    kind: Customer
    shortNames:
      - cust