---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mcsp.mcsp.io
  resources:
  - customers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mcsp.mcsp.io
  resources:
  - customers/finalizers
  verbs:
  - update
- apiGroups:
  - mcsp.mcsp.io
  resources:
  - customers/status
  verbs:
  - get
  - patch
  - update
