apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mcsp-hello-world-tls
  namespace: learning-workspace
spec:
  secretName: mcsp-hello-world-tls
  issuerRef:
    name: mcsp-selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - mcsp-hello-world-learning-workspace.apps.zps-mcsp1.cp.fyre.ibm.com
  duration: 2160h
  renewBefore: 360h