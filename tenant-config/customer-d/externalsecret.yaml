apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: customer-d-secrets
  namespace: customer-d
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-secret-store
    kind: ClusterSecretStore
  target:
    name: customer-d-secrets
    creationPolicy: Owner
  data:
    - secretKey: customerName
      remoteRef:
        key: customer-d-source-secret
        property: customerName
    - secretKey: apiKey
      remoteRef:
        key: customer-d-source-secret
        property: apiKey
    - secretKey: dbPassword
      remoteRef:
        key: customer-d-source-secret
        property: dbPassword