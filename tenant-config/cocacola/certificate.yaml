apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cocacola-tls
  namespace: cocacola
spec:
  secretName: cocacola-tls
  issuerRef:
    name: mcsp-selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - mcsp-app-cocacola.apps.zps-mcsp1.cp.fyre.ibm.com
  duration: 2160h
  renewBefore: 360h