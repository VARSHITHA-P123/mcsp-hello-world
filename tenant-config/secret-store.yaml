apiVersion: v1
kind: Secret
metadata:
  name: pepsi-source-secret
  namespace: learning-workspace
type: Opaque
stringData:
  customerName: "Pepsi"
  apiKey: "pepsi-api-key-12345"
  dbPassword: "pepsi-db-pass-secure"
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: kubernetes-secret-store
spec:
  provider:
    kubernetes:
      remoteNamespace: learning-workspace
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: learning-workspace
      auth:
        serviceAccount:
          name: pipeline
          namespace: learning-workspace
---
apiVersion: v1
kind: Secret
metadata:
  name: cocacola-source-secret
  namespace: learning-workspace
type: Opaque
stringData:
  customerName: "Coca Cola"
  apiKey: "cocacola-api-key-12345"
  dbPassword: "cocacola-db-pass-secure"