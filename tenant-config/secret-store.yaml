apiVersion: v1
kind: Secret
metadata:
  name: customer-a-source-secret
  namespace: learning-workspace
type: Opaque
stringData:
  customerName: "Customer A"
  apiKey: "customer-a-api-key-12345"
  dbPassword: "customer-a-db-pass-secure"
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: kubernetes-secret-store
spec:
  provider:
    kubernetes:
      remoteNamespace: learning-workspace
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: learning-workspace
      auth:
        serviceAccount:
          name: pipeline
          namespace: learning-workspace