apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcsp-app
  namespace: customer-c
  labels:
    app: mcsp-app
    tenant: customer-c
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcsp-app
  template:
    metadata:
      labels:
        app: mcsp-app
        tenant: customer-c
    spec:
      containers:
        - name: mcsp-app
          image: image-registry.openshift-image-registry.svc:5000/learning-workspace/mcsp-hello-world:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SCENARIO
              value: "2 of 3"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CUSTOMER_NAME
              valueFrom:
                secretKeyRef:
                  name: customer-c-secrets
                  key: customerName
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: customer-c-secrets
                  key: apiKey
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10