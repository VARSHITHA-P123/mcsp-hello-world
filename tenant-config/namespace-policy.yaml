apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: customer-namespace-policy
  namespace: learning-workspace
  annotations:
    policy.open-cluster-management.io/standards: NIST-CSF
    policy.open-cluster-management.io/categories: PR.IP Information Protection
    policy.open-cluster-management.io/controls: PR.IP-1 Baseline Configuration
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: customer-a-namespace
        spec:
          remediationAction: enforce
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: customer-a
                  labels:
                    tenant: customer-a
                    customer: "true"
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ResourceQuota
                metadata:
                  name: customer-a-quota
                  namespace: customer-a
                spec:
                  hard:
                    requests.cpu: "1"
                    requests.memory: 512Mi
                    limits.cpu: "2"
                    limits.memory: 1Gi
                    pods: "10"
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: customer-namespace-policy-binding
  namespace: learning-workspace
placementRef:
  name: mcsp-hello-world-placement
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: customer-namespace-policy
    apiGroup: policy.open-cluster-management.io
    kind: Policy
