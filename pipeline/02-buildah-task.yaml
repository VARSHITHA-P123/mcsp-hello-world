apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildah-build-push
  namespace: learning-workspace
spec:
  params:
    - name: IMAGE
      type: string
    - name: DOCKERFILE
      type: string
      default: ./app/Dockerfile
    - name: CONTEXT
      type: string
      default: ./app
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: registry.redhat.io/rhel8/buildah:latest
      securityContext:
        privileged: true
      script: |
        buildah bud \
          --tls-verify=false \
          --file=$(params.DOCKERFILE) \
          --tag=$(params.IMAGE) \
          $(params.CONTEXT)

        buildah push \
          --tls-verify=false \
          $(params.IMAGE) \
          docker://$(params.IMAGE)
      volumeMounts:
        - name: varlibcontainers
          mountPath: /var/lib/containers
  volumes:
    - name: varlibcontainers
      emptyDir: {}