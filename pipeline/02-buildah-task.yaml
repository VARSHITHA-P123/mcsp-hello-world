apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildah-build-push
  namespace: learning-workspace
spec:
  params:
    - name: IMAGE
      type: string
      default: image-registry.openshift-image-registry.svc:5000/learning-workspace/mcsp-hello-world:latest
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
      script: |
        #!/bin/sh
        set -e

        echo "=== Starting OpenShift build ==="
        echo "Source directory contents:"
        ls $(workspaces.source.path)/app/

        echo "=== Triggering BuildConfig ==="
        oc start-build mcsp-hello-world \
          --from-dir=$(workspaces.source.path)/app \
          --follow \
          --wait \
          -n learning-workspace

        echo "=== Build completed successfully ==="
        oc get istag mcsp-hello-world:latest -n learning-workspace