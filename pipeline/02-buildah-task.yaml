apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildah-build-push
  namespace: learning-workspace
spec:
  params:
    - name: IMAGE
      type: string
    - name: DOCKERFILE
      type: string
      default: ./app/Dockerfile
    - name: CONTEXT
      type: string
      default: ./app
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
      script: |
        #!/bin/sh
        set -e

        echo "Creating ImageStream if not exists..."
        oc create imagestream mcsp-hello-world -n learning-workspace --dry-run=client -o yaml | oc apply -f -

        echo "Creating BuildConfig..."
        oc new-build \
          --name=mcsp-hello-world \
          --binary=true \
          --strategy=docker \
          --dockerfile-path=Dockerfile \
          --to=mcsp-hello-world:latest \
          -n learning-workspace \
          --dry-run=client -o yaml | oc apply -f -

        echo "Starting build from source..."
        oc start-build mcsp-hello-world \
          --from-dir=$(workspaces.source.path)/app \
          --follow \
          --wait \
          -n learning-workspace