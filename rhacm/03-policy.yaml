apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: mcsp-hello-world-policy
  namespace: learning-workspace
  annotations:
    policy.open-cluster-management.io/standards: NIST-CSF
    policy.open-cluster-management.io/categories: PR.DS Data Security
    policy.open-cluster-management.io/controls: PR.DS-1 Data-at-rest
spec:
  remediationAction: inform
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: mcsp-hello-world-config
        spec:
          remediationAction: inform
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: mcsp-hello-world
                  namespace: learning-workspace
                spec:
                  replicas: 2
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: mcsp-hello-world-placement-binding
  namespace: learning-workspace
placementRef:
  name: mcsp-hello-world-placement
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: mcsp-hello-world-policy
    apiGroup: policy.open-cluster-management.io
    kind: Policy
