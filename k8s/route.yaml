apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mcsp-hello-world
  namespace: learning-workspace
  annotations:
    cert-manager.io/issuer-kind: ClusterIssuer
    cert-manager.io/issuer-name: mcsp-selfsigned-issuer
  labels:
    app: mcsp-hello-world
spec:
  to:
    kind: Service
    name: mcsp-hello-world
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
    certificate: ""
    key: ""
  wildcardPolicy: None