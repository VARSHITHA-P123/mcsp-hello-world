apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: openshift-build
  namespace: learning-workspace
spec:
  results:
    - name: IMAGE_TAG
      description: The image tag that was built
  steps:
    - name: start-build
      image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
      script: |
        #!/bin/sh
        set -e

        echo "=== Triggering OpenShift Build ==="
        oc start-build mcsp-hello-world \
          --follow \
          --wait \
          -n learning-workspace

        echo "=== Build completed ==="
        BUILD_NAME=$(oc get builds -n learning-workspace --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}')
        BUILD_NUMBER=$(echo $BUILD_NAME | grep -o '[0-9]*$')
        IMAGE_TAG="v1.0.${BUILD_NUMBER}"

        echo "=== Image tag: ${IMAGE_TAG} ==="
        echo -n "${IMAGE_TAG}" > $(results.IMAGE_TAG.path)